  "@fontsource-variable/inter": ^5.2.8
  "@fontsource-variable/manrope": ^5.2.8
  "@remixicon/react": ^4.9.0
  "@tailwindcss/typography": ^0.5.16
  "@tailwindcss/vite": ^4
  "@tanstack/devtools-vite": latest
