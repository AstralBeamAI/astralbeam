  "@tanstack/router-cli": latest
  "@tanstack/router-plugin": latest
  "@testing-library/dom": ^10.4.1
  "@testing-library/react": ^16.3.2
  "@types/node": ^22
  "@types/react": ^19
  "@types/react-dom": ^19
  "@vitejs/plugin-react": ^6
  class-variance-authority: ^0.7.1
